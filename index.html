<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Portfolio of Tanvir Nahian Swapnil — Former Army Officer, Security & ICT Operations Specialist." />
    <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Captain Tanvir Nahian Swapnil (Retired) — Portfolio</title>
    <script>
      (function () {
        var storedTheme = localStorage.getItem('portfolio-theme');
        var storedColor = localStorage.getItem('portfolio-color-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = storedTheme === 'dark' || storedTheme === 'light'
          ? storedTheme
          : prefersDark ? 'dark' : 'light';
        var colorTheme = storedColor === 'google' || storedColor === 'army' ||
          storedColor === 'tech' || storedColor === 'youtube'
          ? storedColor
          : 'google';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-color-theme', colorTheme);
        document.documentElement.classList.toggle('dark', theme === 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
